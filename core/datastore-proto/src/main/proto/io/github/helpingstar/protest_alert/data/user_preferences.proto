syntax = "proto3";

option java_package = "io.github.helpingstar.protest_alert.core.datastore";
option java_multiple_files = true;

message UserPreferences {
  string regionLastUpdatedAt = 1;
  string protestResourceLastUpdatedAt = 2;
  map<string, bool> followed_region_ids = 3;
  bool should_hide_onboarding = 4;
  string announcementLastUpdatedAt = 5;
  bool update_notification_enabled = 6;
}
